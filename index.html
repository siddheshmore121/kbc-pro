<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC Pro - Group Edition</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at center, #1a1a4d 0%, #0a0a2e 70%, #05051a 100%);
            color: white; min-height: 100vh; display: flex;
            justify-content: center; align-items: center;
        }
        #landing, #group-select, #level-select, #quiz-ready, #game {
            width: 90%; max-width: 850px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: rgba(10, 10, 50, 0.9); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 40px; border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); margin: 20px;
        }
        .hidden { display: none !important; }
        .kbc-logo { width: 120px; margin-bottom: 15px; filter: drop-shadow(0 0 10px #ffd700); }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; width: 100%; }
        
        .btn-choice {
            padding: 20px; border-radius: 15px; border: 2px solid #ffd700;
            background: rgba(255, 215, 0, 0.1); color: #ffd700; font-size: 18px;
            cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn-choice:hover { background: #ffd700; color: #000; transform: scale(1.05); }
        
        .btn-main { 
            padding: 15px 50px; background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%); 
            border: 2px solid #fff; border-radius: 40px; cursor: pointer; 
            font-weight: bold; font-size: 20px; color: #000; margin-top: 20px; 
        }

        .question-box { 
            width: 100%; padding: 25px; background: linear-gradient(90deg, #00004d 0%, #000099 50%, #00004d 100%); 
            border-radius: 50px; border: 2px solid #ffd700; font-size: 22px; margin-bottom: 25px; box-sizing: border-box; 
        }
        
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .option { 
            background: rgba(0, 0, 100, 0.7); padding: 15px; border-radius: 40px; 
            border: 1.5px solid #4da6ff; cursor: pointer; font-size: 18px; transition: 0.2s; 
        }
        
        .locked { background: #ffa500 !important; color: black; border-color: #fff; }
        .correct { background: #2ecc71 !important; color: white; border-color: #fff; }
        .wrong { background: #e74c3c !important; color: white; border-color: #fff; }
        
        #timer-container { 
            width: 70px; height: 70px; border-radius: 50%; border: 3px solid #ffd700; 
            display: flex; justify-content: center; align-items: center; font-size: 28px; 
            margin-bottom: 15px; background: #cc0000; font-weight: bold; 
        }

        .q-counter { color: #ffd700; font-size: 18px; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="landing">
        <img src="kbc.png" class="kbc-logo">
        <h1 style="color: #ffd700;">“भीम ज्ञान स्पर्धा 2026”</h1>
        <button class="btn-main" onclick="showGroups()">खेळायला सुरुवात करा</button>
    </div>

    <div id="group-select" class="hidden">
        <h2 style="color: #ffd700;">तुमचा गट निवडा</h2>
        <div class="grid-container">
            <button class="btn-choice" onclick="selectGroup('chota')">१. छोटा गट<br>(इ. १ ली ते ४ थी)</button>
            <button class="btn-choice" onclick="selectGroup('medium')">२. मध्यम गट<br>(इ. ५ वी ते ८ वी)</button>
            <button class="btn-choice" onclick="selectGroup('open')">३. ओपन गट<br>(सर्व वयोगट)</button>
        </div>
    </div>

    <div id="level-select" class="hidden">
        <h2 id="level-title" style="color: #ffd700;">विषय निवडा</h2>
        <div class="grid-container" id="level-buttons"></div>
        <button class="btn-main" onclick="showGroups()" style="font-size: 14px;">मागे जा</button>
    </div>

    <div id="quiz-ready" class="hidden">
        <h2 id="ready-title" style="color: #ffd700;">तुम्ही तयार आहात का?</h2>
        <p id="ready-info" style="font-size: 18px;"></p>
        <button class="btn-main" onclick="actualStartGame()">क्विझ सुरू करा!</button>
    </div>

    <div id="game" class="hidden">
        <div class="q-counter" id="question-number">प्रश्न: ०/०</div>
        <div id="timer-container"><span id="timer">45</span></div>
        <div class="question-box" id="question">प्रश्न लोड होत आहे...</div>
        <div class="options" id="options"></div>
        <button id="nextBtn" class="btn-main hidden" onclick="nextQ()">पुढचा प्रश्न</button>
    </div>

    <script>
        const audioIntro = new Audio('intro.mp3');
        const audioTimer = new Audio('timer.mp3');
        const audioLock = new Audio('lock.mp3');
        const audioCorrect = new Audio('correct.mp3');
        const audioWrong = new Audio('wrong.mp3');

        audioTimer.loop = true;

        const gameData = {
            chota: {
                title: "छोटा गट (Junior)",
                files: [
                    { 
                        name: "सामान्य ज्ञान (जी.के.)", 
                        questions: [
                            { q: "बाबासाहेबांचा जन्म कधी झाला?", opt: ["१४ एप्रिल", "१५ ऑगस्ट", "२६ जानेवारी", "२ ऑक्टोबर"], ans: 0 },
                            { q: "भारताचे राष्ट्रगीत कोणते?", opt: ["वंदे मातरम", "जन गण मन", "सारे जहाँ से अच्छा", "जय हिंद"], ans: 1 },
                            { q: "छत्रपती शिवाजी महाराज यांचे वडील कोण?", opt: ["संभाजी", "शहाजीराजे", "मालोजी", "तानाजी"], ans: 1 },
                            { q: "बाबासाहेबांची आई कोण?", opt: ["जिजाबाई", "रमाबाई", "भीमाबाई", "लक्ष्मीबाई"], ans: 2 },
                            { q: "संविधानातील भाग ३ मध्ये काय आहे?", opt: ["कर्तव्य", "हक्क", "न्यायालय", "कर"], ans: 1 },
                            { q: "सावित्रीबाई फुले यांनी काय सुरू केले?", opt: ["मंदिर", "बँक", "शाळा", "कारखाना"], ans: 2 },
                            { q: "बाबासाहेबांनी कोणते वृत्तपत्र सुरू केले?", opt: ["सामना", "बहिष्कृत भारत", "लोकमत", "केसरी"], ans: 1 },
                            { q: "बाबासाहेबांचे निधन कुठे झाले?", opt: ["मुंबई", "नागपूर", "पुणे", "दिल्ली"], ans: 3 },
                            { q: "संविधानावर स्वाक्षरी किती सदस्यांनी केली?", opt: ["२००", "३००", "२८४", "१५०"], ans: 2 },
                            { q: "बाबासाहेबांचे घोषवाक्य काय?", opt: ["जय हिंद", "शिका, संघटित व्हा, संघर्ष करा", "वंदे मातरम", "सत्यमेव जयते"], ans: 1 }
                        ]
                    }
                ]
            },
            medium: {
                title: "मध्यम गट (Middle)",
                files: [
                    { name: "इतिहास", questions: [
                        { q: "स्वराज्य स्थापनेची शपथ शिवरायांनी कोठे घेतली?", opt: ["प्रतापगड", "रायगड", "रायरेश्वर", "तोरणा"], ans: 2 }
                    ]}
                ]
            },
            open: {
                title: "ओपन गट (Open)",
                files: [
                    { name: "भारतीय संविधान", questions: [
                        { q: "संविधान दिन कधी साजरा केला जातो?", opt: ["१५ ऑगस्ट", "२६ जानेवारी", "२६ नोव्हेंबर", "१४ एप्रिल"], ans: 2 }
                    ]}
                ]
            }
        };

        let currentQList = [];
        let index = 0;
        let timer;
        let timeLeft = 45;

        function stopAllAudio() {
            [audioIntro, audioTimer, audioLock, audioCorrect, audioWrong].forEach(a => {
                a.pause();
                a.currentTime = 0;
            });
        }

        function showGroups() {
            stopAllAudio();
            hideAll();
            document.getElementById("group-select").classList.remove("hidden");
        }

        function selectGroup(groupKey) {
            const group = gameData[groupKey];
            document.getElementById("level-title").innerText = group.title;
            const container = document.getElementById("level-buttons");
            container.innerHTML = "";
            group.files.forEach((file, i) => {
                const btn = document.createElement("button");
                btn.className = "btn-choice";
                btn.innerHTML = `फाईल ${i+1}:<br>${file.name}`;
                btn.onclick = () => prepareQuiz(file);
                container.appendChild(btn);
            });
            hideAll();
            document.getElementById("level-select").classList.remove("hidden");
        }

        function prepareQuiz(file) {
            currentQList = file.questions;
            index = 0;
            hideAll();
            document.getElementById("quiz-ready").classList.remove("hidden");
            document.getElementById("ready-info").innerText = `विषय: ${file.name}\nएकूण प्रश्न: ${currentQList.length}`;
            stopAllAudio();
            audioIntro.play();
        }

        function actualStartGame() {
            stopAllAudio();
            hideAll();
            document.getElementById("game").classList.remove("hidden");
            loadQuestion();
        }

        function loadQuestion() {
            stopAllAudio();
            timeLeft = 45;
            document.getElementById("timer").innerText = timeLeft;
            document.getElementById("nextBtn").classList.add("hidden");
            document.getElementById("question-number").innerText = `प्रश्न: ${index + 1} / ${currentQList.length}`;
            
            let q = currentQList[index];
            document.getElementById("question").innerText = q.q;
            
            let html = "";
            q.opt.forEach((o, i) => {
                html += `<div class="option" onclick="handleLock(${i}, this)">${o}</div>`;
            });
            document.getElementById("options").innerHTML = html;
            
            audioTimer.play();
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById("timer").innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    stopAllAudio();
                    audioWrong.play();
                    alert("वेळ संपली!");
                    showGroups();
                }
            }, 1000);
        }

        function handleLock(i, el) {
            clearInterval(timer);
            stopAllAudio();
            audioLock.play();

            const opts = document.querySelectorAll(".option");
            opts.forEach(opt => opt.style.pointerEvents = "none");
            
            el.classList.add("locked");

            setTimeout(() => {
                checkAnswer(i, el);
            }, 2000);
        }

        function checkAnswer(i, el) {
            const correct = currentQList[index].ans;
            const opts = document.querySelectorAll(".option");
            el.classList.remove("locked");

            if (i === correct) {
                el.classList.add("correct");
                audioCorrect.play();
                document.getElementById("nextBtn").classList.remove("hidden");
            } else {
                el.classList.add("wrong");
                opts[correct].classList.add("correct");
                audioWrong.play();
                setTimeout(() => {
                    alert("चुकीचे उत्तर! पुन्हा प्रयत्न करा.");
                    showGroups();
                }, 2000);
            }
        }

        function nextQ() {
            index++;
            if (index < currentQList.length) {
                loadQuestion();
            } else {
                stopAllAudio();
                alert("अभिनंदन! तुम्ही ही फाईल पूर्ण केली आहे.");
                showGroups();
            }
        }

        function hideAll() {
            ["landing", "group-select", "level-select", "quiz-ready", "game"].forEach(id => {
                document.getElementById(id).classList.add("hidden");
            });
        }
    </script>
</body>
</html>
