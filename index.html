<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC Pro - Group Edition</title>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle at center, #1a1a4d 0%, #0a0a2e 70%, #05051a 100%);
            color: white; min-height: 100vh; display: flex;
            justify-content: center; align-items: center;
        }
        #landing, #group-select, #level-select, #intro, #game {
            width: 90%; max-width: 850px; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: rgba(10, 10, 50, 0.9); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 40px; border: 2px solid #ffd700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); margin: 20px;
        }
        .hidden { display: none !important; }
        .kbc-logo { width: 120px; margin-bottom: 15px; filter: drop-shadow(0 0 10px #ffd700); }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; width: 100%; }
        .btn-choice {
            padding: 20px; border-radius: 15px; border: 2px solid #ffd700;
            background: rgba(255, 215, 0, 0.1); color: #ffd700; font-size: 18px;
            cursor: pointer; transition: 0.3s; font-weight: bold;
        }
        .btn-choice:hover { background: #ffd700; color: #000; transform: scale(1.05); }
        .btn-main { padding: 15px 50px; background: linear-gradient(180deg, #ffd700 0%, #b8860b 100%); border: 2px solid #fff; border-radius: 40px; cursor: pointer; font-weight: bold; font-size: 20px; color: #000; margin-top: 20px; }
        .question-box { width: 100%; padding: 25px; background: linear-gradient(90deg, #00004d 0%, #000099 50%, #00004d 100%); border-radius: 50px; border: 2px solid #ffd700; font-size: 22px; margin-bottom: 25px; box-sizing: border-box; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; }
        .option { background: rgba(0, 0, 100, 0.7); padding: 15px; border-radius: 40px; border: 1.5px solid #4da6ff; cursor: pointer; font-size: 18px; }
        .correct { background: #2ecc71 !important; }
        .wrong { background: #e74c3c !important; }
        #timer-container { width: 70px; height: 70px; border-radius: 50%; border: 3px solid #ffd700; display: flex; justify-content: center; align-items: center; font-size: 28px; margin-bottom: 15px; background: #cc0000; }
    </style>
</head>
<body>

    <div id="landing">
        <img src="https://via.placeholder.com/150/000080/FFFFFF?text=KBC" class="kbc-logo">
        <h1 style="color: #ffd700;">कोण बनेल भीम ज्ञानी?</h1>
        <button class="btn-main" onclick="showGroups()">खेळायला सुरुवात करा</button>
    </div>

    <div id="group-select" class="hidden">
        <h2 style="color: #ffd700;">तुमचा गट निवडा</h2>
        <div class="grid-container">
            <button class="btn-choice" onclick="selectGroup('chota')">१. छोटा गट<br>(इ. १ ली ते ४ थी)</button>
            <button class="btn-choice" onclick="selectGroup('medium')">२. मध्यम गट<br>(इ. ५ वी ते ८ वी)</button>
            <button class="btn-choice" onclick="selectGroup('open')">३. ओपन गट<br>(सर्व वयोगट)</button>
        </div>
    </div>

    <div id="level-select" class="hidden">
        <h2 id="level-title" style="color: #ffd700;">विषय निवडा</h2>
        <div class="grid-container" id="level-buttons">
            </div>
        <button class="btn-main" onclick="showGroups()" style="font-size: 14px;">मागे जा</button>
    </div>

    <div id="game" class="hidden">
        <div id="timer-container"><span id="timer">45</span></div>
        <div class="question-box" id="question">प्रश्न लोड होत आहे...</div>
        <div class="options" id="options"></div>
        <button id="nextBtn" class="btn-main hidden" onclick="nextQ()">पुढचा प्रश्न</button>
    </div>

    <script>
        // डेटा स्ट्रक्चर (Folders and Files)
        const gameData = {
            chota: {
                title: "छोटा गट (Junior)",
                files: [
                    { name: "प्राणी आणि पक्षी", questions: [
                        { q: "जंगलाचा राजा कोणाला म्हणतात?", opt: ["वाघ", "सिंह", "हत्ती", "जिराफ"], ans: 1 },
                        { q: "आपला राष्ट्रीय पक्षी कोणता?", opt: ["पोपट", "कावळा", "मोर", "चिमणी"], ans: 2 }
                    ]},
                    { name: "सामान्य ज्ञान १", questions: [
                        { q: "आठवड्यात किती दिवस असतात?", opt: ["५", "६", "७", "८"], ans: 2 },
                        { q: "इंद्रधनुष्यात किती रंग असतात?", opt: ["५", "७", "१०", "४"], ans: 1 }
                    ]},
                    { name: "फळे आणि फुले", questions: [
                        { q: "फळांचा राजा कोणता?", opt: ["सफरचंद", "आंबा", "केळी", "चिकू"], ans: 1 },
                        { q: "भारताचे राष्ट्रीय फूल कोणते?", opt: ["गुलाब", "कमळ", "जास्वंद", "मोगरा"], ans: 1 }
                    ]},
                    { name: "आपले शरीर", questions: [
                        { q: "आपण डोळ्यांनी काय करतो?", opt: ["ऐकतो", "चालतो", "पाहतो", "खातो"], ans: 2 },
                        { q: "चव घेण्यासाठी आपण कशाचा वापर करतो?", opt: ["नाक", "जीभ", "कान", "हात"], ans: 1 }
                    ]}
                ]
            },
            medium: {
                title: "मध्यम गट (Middle)",
                files: [
                    { name: "इतिहास", questions: [
                        { q: "स्वराज्य स्थापनेची शपथ शिवरायांनी कोठे घेतली?", opt: ["प्रतापगड", "रायगड", "रायरेश्वर", "तोरणा"], ans: 2 },
                        { q: "झाशीची राणी कोण होती?", opt: ["जिजाबाई", "लक्ष्मीबाई", "अहिल्याबाई", "ताराबाई"], ans: 1 }
                    ]},
                    { name: "भूगोल", questions: [
                        { q: "महाराष्ट्राची राजधानी कोणती?", opt: ["पुणे", "नागपूर", "मुंबई", "नाशिक"], ans: 2 },
                        { q: "भारतातील सर्वात लांब नदी कोणती?", opt: ["यमुना", "गंगा", "गोदावरी", "नर्मदा"], ans: 1 }
                    ]},
                    { name: "विज्ञान", questions: [
                        { q: "पाण्याचे रासायनिक सूत्र काय आहे?", opt: ["CO2", "H2O", "O2", "NaCl"], ans: 1 },
                        { q: "पृथ्वीला सूर्याभोवती फिरण्यास काय म्हणतात?", opt: ["अक्षीय फिरणे", "परिभ्रमण", "वलय", "गती"], ans: 1 }
                    ]},
                    { name: "मराठी व्याकरण", questions: [
                        { q: "'घोडा' या शब्दाचे अनेकवचन काय?", opt: ["घोडी", "घोड्या", "घोडे", "घोडो"], ans: 2 },
                        { q: "नाम म्हणजे काय?", opt: ["क्रिया", "नाव", "विशेषण", "सर्वनाम"], ans: 1 }
                    ]}
                ]
            },
            open: {
                title: "ओपन गट (Open)",
                files: [
                    { name: "भारतीय संविधान", questions: [
                        { q: "संविधान दिन कधी साजरा केला जातो?", opt: ["१५ ऑगस्ट", "२६ जानेवारी", "२६ नोव्हेंबर", "१४ एप्रिल"], ans: 2 },
                        { q: "मसुदा समितीचे अध्यक्ष कोण होते?", opt: ["नेहरू", "डॉ. आंबेडकर", "पटेल", "राजेंद्र प्रसाद"], ans: 1 }
                    ]},
                    { name: "चालू घडामोडी", questions: [
                        { q: "भारताचे सध्याचे राष्ट्रपती कोण आहेत?", opt: ["नरेंद्र मोदी", "द्रौपदी मुर्मू", "रामनाथ कोविंद", "अमित शाह"], ans: 1 },
                        { q: "२०२४ चा ऑलिम्पिक खेळ कोठे झाला?", opt: ["टोकियो", "पॅरिस", "लंडन", "दिल्ली"], ans: 1 }
                    ]},
                    { name: "महाराष्ट्र गौरव", questions: [
                        { q: "महाराष्ट्राचे आराध्य दैवत कोण?", opt: ["श्री गणेश", "छत्रपती शिवाजी महाराज", "खंडोबा", "विठ्ठल"], ans: 1 },
                        { q: "भारताचे प्रवेशद्वार कोठे आहे?", opt: ["दिल्ली", "मुंबई", "कोलकाता", "चेन्नई"], ans: 1 }
                    ]},
                    { name: "क्रीडा", questions: [
                        { q: "सचिन तेंडुलकर कोणत्या खेळाशी संबंधित आहे?", opt: ["हॉकी", "फुटबॉल", "क्रिकेट", "कबड्डी"], ans: 2 },
                        { q: "भारताचा राष्ट्रीय खेळ कोणता?", opt: ["क्रिकेट", "हॉकी", "कबड्डी", "खो-खो"], ans: 1 }
                    ]}
                ]
            }
        };

        let currentQList = [];
        let index = 0;
        let timer;
        let timeLeft = 45;

        function showGroups() {
            document.getElementById("landing").classList.add("hidden");
            document.getElementById("level-select").classList.add("hidden");
            document.getElementById("game").classList.add("hidden");
            document.getElementById("group-select").classList.remove("hidden");
        }

        function selectGroup(groupKey) {
            const group = gameData[groupKey];
            document.getElementById("level-title").innerText = group.title;
            const container = document.getElementById("level-buttons");
            container.innerHTML = "";

            group.files.forEach((file, i) => {
                const btn = document.createElement("button");
                btn.className = "btn-choice";
                btn.innerHTML = `फाईल ${i+1}:<br>${file.name}`;
                btn.onclick = () => startLevel(file.questions);
                container.appendChild(btn);
            });

            document.getElementById("group-select").classList.add("hidden");
            document.getElementById("level-select").classList.remove("hidden");
        }

        function startLevel(questions) {
            currentQList = questions;
            index = 0;
            document.getElementById("level-select").classList.add("hidden");
            document.getElementById("game").classList.remove("hidden");
            loadQuestion();
        }

        function loadQuestion() {
            timeLeft = 45;
            document.getElementById("timer").innerText = timeLeft;
            document.getElementById("nextBtn").classList.add("hidden");
            
            let q = currentQList[index];
            document.getElementById("question").innerText = q.q;
            
            let html = "";
            q.opt.forEach((o, i) => {
                html += `<div class="option" onclick="checkAnswer(${i}, this)">${o}</div>`;
            });
            document.getElementById("options").innerHTML = html;
            
            startTimer();
        }

        function startTimer() {
            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                document.getElementById("timer").innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    alert("वेळ संपली!");
                    showGroups();
                }
            }, 1000);
        }

        function checkAnswer(i, el) {
            clearInterval(timer);
            const correct = currentQList[index].ans;
            const opts = document.querySelectorAll(".option");
            
            opts.forEach(opt => opt.style.pointerEvents = "none");

            if (i === correct) {
                el.classList.add("correct");
                document.getElementById("nextBtn").classList.remove("hidden");
            } else {
                el.classList.add("wrong");
                opts[correct].classList.add("correct");
                setTimeout(() => {
                    alert("चुकीचे उत्तर! पुन्हा प्रयत्न करा.");
                    showGroups();
                }, 1500);
            }
        }

        function nextQ() {
            index++;
            if (index < currentQList.length) {
                loadQuestion();
            } else {
                alert("अभिनंदन! तुम्ही ही फाईल पूर्ण केली आहे.");
                showGroups();
            }
        }
    </script>
</body>
</html>
